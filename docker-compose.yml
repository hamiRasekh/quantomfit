services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: quantumfit
      POSTGRES_USER: quantumfit
      POSTGRES_PASSWORD: quantumfit
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quantumfit -d quantumfit"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
